<svg viewBox="0 0 720 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Five legacy systems collapse into one normalized graph">
  <defs>
    <linearGradient id="dgLegacy" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#E04F4F" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#E04F4F" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="dgClean" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#6EF76E" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#6EF76E" stop-opacity="0.7"/>
    </linearGradient>
  </defs>

  <!-- LEFT · 5 legacy cylinders -->
  <text x="20" y="28" fill="#E04F4F" fill-opacity="0.9" font-size="10" font-family="JetBrains Mono" letter-spacing="2">
    BEFORE · 5 LEGACY SYSTEMS
  </text>

  <!-- Cylinder template positions: y = 56 + i*58. File types: .mdb .sql api xml csv -->
  <g transform="translate(0, 56)">
    <rect x="20" y="6" width="170" height="34" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.55"/>
    <ellipse cx="105" cy="6" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.14" stroke="#E04F4F" stroke-opacity="0.75"/>
    <ellipse cx="105" cy="40" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.45"/>
    <text x="36" y="28" fill="#ffffff" font-size="12" font-family="Inter" font-weight="500">GlobalJade</text>
    <text x="174" y="28" fill="#E04F4F" fill-opacity="0.85" font-size="9" font-family="JetBrains Mono" text-anchor="end" letter-spacing="1">.mdb</text>
  </g>
  <g transform="translate(0, 114)">
    <rect x="20" y="6" width="170" height="34" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.55"/>
    <ellipse cx="105" cy="6" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.14" stroke="#E04F4F" stroke-opacity="0.75"/>
    <ellipse cx="105" cy="40" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.45"/>
    <text x="36" y="28" fill="#ffffff" font-size="12" font-family="Inter" font-weight="500">ImageDB</text>
    <text x="174" y="28" fill="#E04F4F" fill-opacity="0.85" font-size="9" font-family="JetBrains Mono" text-anchor="end" letter-spacing="1">.sql</text>
  </g>
  <g transform="translate(0, 172)">
    <rect x="20" y="6" width="170" height="34" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.55"/>
    <ellipse cx="105" cy="6" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.14" stroke="#E04F4F" stroke-opacity="0.75"/>
    <ellipse cx="105" cy="40" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.45"/>
    <text x="36" y="28" fill="#ffffff" font-size="12" font-family="Inter" font-weight="500">The Hub</text>
    <text x="174" y="28" fill="#E04F4F" fill-opacity="0.85" font-size="9" font-family="JetBrains Mono" text-anchor="end" letter-spacing="1">api</text>
  </g>
  <g transform="translate(0, 230)">
    <rect x="20" y="6" width="170" height="34" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.55"/>
    <ellipse cx="105" cy="6" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.14" stroke="#E04F4F" stroke-opacity="0.75"/>
    <ellipse cx="105" cy="40" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.45"/>
    <text x="36" y="28" fill="#ffffff" font-size="12" font-family="Inter" font-weight="500">CRM</text>
    <text x="174" y="28" fill="#E04F4F" fill-opacity="0.85" font-size="9" font-family="JetBrains Mono" text-anchor="end" letter-spacing="1">xml</text>
  </g>
  <g transform="translate(0, 288)">
    <rect x="20" y="6" width="170" height="34" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.55"/>
    <ellipse cx="105" cy="6" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.14" stroke="#E04F4F" stroke-opacity="0.75"/>
    <ellipse cx="105" cy="40" rx="85" ry="7" fill="#E04F4F" fill-opacity="0.06" stroke="#E04F4F" stroke-opacity="0.45"/>
    <text x="36" y="28" fill="#ffffff" font-size="12" font-family="Inter" font-weight="500">eWay</text>
    <text x="174" y="28" fill="#E04F4F" fill-opacity="0.85" font-size="9" font-family="JetBrains Mono" text-anchor="end" letter-spacing="1">csv</text>
  </g>

  <!-- CENTRE · normalization lane -->
  <rect x="220" y="56" width="210" height="300" rx="3" fill="#3F4AAF" fill-opacity="0.05" stroke="#3F4AAF" stroke-opacity="0.35" stroke-dasharray="3 4"/>
  <text x="325" y="78" fill="#3F4AAF" font-size="10" font-family="JetBrains Mono" letter-spacing="2" text-anchor="middle">NORMALIZATION LANE</text>
  <text x="325" y="94" fill="#ffffff" fill-opacity="0.55" font-size="9" font-family="JetBrains Mono" letter-spacing="1" text-anchor="middle">pimcore · mdm</text>

  <!-- connectors legacy → lane -->
  <path d="M 190 85 C 205 85 215 170 220 170" fill="none" stroke="url(#dgLegacy)" stroke-width="1.2" stroke-dasharray="3 4"/>
  <path d="M 190 143 C 205 143 215 180 220 180" fill="none" stroke="url(#dgLegacy)" stroke-width="1.2" stroke-dasharray="3 4"/>
  <path d="M 190 201 C 205 201 215 190 220 190" fill="none" stroke="url(#dgLegacy)" stroke-width="1.2" stroke-dasharray="3 4"/>
  <path d="M 190 259 C 205 259 215 200 220 200" fill="none" stroke="url(#dgLegacy)" stroke-width="1.2" stroke-dasharray="3 4"/>
  <path d="M 190 317 C 205 317 215 210 220 210" fill="none" stroke="url(#dgLegacy)" stroke-width="1.2" stroke-dasharray="3 4"/>

  <!-- lane rules -->
  <line x1="230" x2="420" y1="210" y2="210" stroke="#3F4AAF" stroke-opacity="0.35" stroke-width="0.5" stroke-dasharray="2 3"/>
  <text x="325" y="250" fill="#ffffff" fill-opacity="0.85" font-size="11" font-family="JetBrains Mono" text-anchor="middle">SIC → student_fk</text>
  <text x="325" y="280" fill="#ffffff" fill-opacity="0.85" font-size="11" font-family="JetBrains Mono" text-anchor="middle">dedupe · sibling_of</text>
  <text x="325" y="310" fill="#ffffff" fill-opacity="0.85" font-size="11" font-family="JetBrains Mono" text-anchor="middle">audit log · every row</text>
  <text x="325" y="340" fill="#ffffff" fill-opacity="0.85" font-size="11" font-family="JetBrains Mono" text-anchor="middle">SCHOOL → STUDENT → ASSET</text>

  <!-- RIGHT · clean entity graph -->
  <text x="700" y="28" fill="#6EF76E" font-size="10" font-family="JetBrains Mono" letter-spacing="2" text-anchor="end">
    AFTER · ONE CLEAN GRAPH
  </text>

  <!-- edges first -->
  <!-- school (530,80) → student (620,160) -->
  <path d="M 530 80 L 620 160" fill="none" stroke="#6EF76E" stroke-opacity="0.55"/>
  <rect x="557" y="113" width="36" height="14" rx="2" fill="#10132C" stroke="#6EF76E" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="575" y="123" fill="#6EF76E" fill-opacity="0.9" font-size="8.5" font-family="JetBrains Mono" text-anchor="middle" letter-spacing="0.5">1 : N</text>
  <!-- student (620,160) → asset (650,290) -->
  <path d="M 620 160 L 650 290" fill="none" stroke="#6EF76E" stroke-opacity="0.55"/>
  <rect x="617" y="218" width="36" height="14" rx="2" fill="#10132C" stroke="#6EF76E" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="635" y="228" fill="#6EF76E" fill-opacity="0.9" font-size="8.5" font-family="JetBrains Mono" text-anchor="middle" letter-spacing="0.5">1 : N</text>
  <!-- student (620,160) → parent (490,240) -->
  <path d="M 620 160 L 490 240" fill="none" stroke="#6EF76E" stroke-opacity="0.55"/>
  <rect x="537" y="193" width="36" height="14" rx="2" fill="#10132C" stroke="#6EF76E" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="555" y="203" fill="#6EF76E" fill-opacity="0.9" font-size="8.5" font-family="JetBrains Mono" text-anchor="middle" letter-spacing="0.5">N : 1</text>
  <!-- parent (490,240) → order (520,360) -->
  <path d="M 490 240 L 520 360" fill="none" stroke="#6EF76E" stroke-opacity="0.55"/>
  <rect x="487" y="293" width="36" height="14" rx="2" fill="#10132C" stroke="#6EF76E" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="505" y="303" fill="#6EF76E" fill-opacity="0.9" font-size="8.5" font-family="JetBrains Mono" text-anchor="middle" letter-spacing="0.5">1 : N</text>
  <!-- asset (650,290) → order (520,360) -->
  <path d="M 650 290 L 520 360" fill="none" stroke="#6EF76E" stroke-opacity="0.55"/>
  <rect x="567" y="318" width="36" height="14" rx="2" fill="#10132C" stroke="#6EF76E" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="585" y="328" fill="#6EF76E" fill-opacity="0.9" font-size="8.5" font-family="JetBrains Mono" text-anchor="middle" letter-spacing="0.5">N : 1</text>

  <!-- nodes -->
  <g>
    <circle cx="530" cy="80" r="30" fill="#6EF76E" fill-opacity="0.05" stroke="url(#dgClean)" stroke-width="1.5"/>
    <circle cx="530" cy="80" r="22" fill="#10132C" fill-opacity="0.55" stroke="#6EF76E" stroke-opacity="0.5" stroke-width="0.7"/>
    <circle cx="530" cy="80" r="3" fill="#6EF76E"/>
    <text x="530" y="126" fill="#ffffff" font-size="11" font-family="JetBrains Mono" font-weight="700" text-anchor="middle" letter-spacing="0.5">SCHOOL</text>
  </g>
  <g>
    <circle cx="620" cy="160" r="30" fill="#6EF76E" fill-opacity="0.05" stroke="url(#dgClean)" stroke-width="1.5"/>
    <circle cx="620" cy="160" r="22" fill="#10132C" fill-opacity="0.55" stroke="#6EF76E" stroke-opacity="0.5" stroke-width="0.7"/>
    <circle cx="620" cy="160" r="3" fill="#6EF76E"/>
    <text x="620" y="206" fill="#ffffff" font-size="11" font-family="JetBrains Mono" font-weight="700" text-anchor="middle" letter-spacing="0.5">STUDENT</text>
  </g>
  <g>
    <circle cx="490" cy="240" r="30" fill="#6EF76E" fill-opacity="0.05" stroke="url(#dgClean)" stroke-width="1.5"/>
    <circle cx="490" cy="240" r="22" fill="#10132C" fill-opacity="0.55" stroke="#6EF76E" stroke-opacity="0.5" stroke-width="0.7"/>
    <circle cx="490" cy="240" r="3" fill="#6EF76E"/>
    <text x="490" y="286" fill="#ffffff" font-size="11" font-family="JetBrains Mono" font-weight="700" text-anchor="middle" letter-spacing="0.5">PARENT</text>
  </g>
  <g>
    <circle cx="650" cy="290" r="30" fill="#6EF76E" fill-opacity="0.05" stroke="url(#dgClean)" stroke-width="1.5"/>
    <circle cx="650" cy="290" r="22" fill="#10132C" fill-opacity="0.55" stroke="#6EF76E" stroke-opacity="0.5" stroke-width="0.7"/>
    <circle cx="650" cy="290" r="3" fill="#6EF76E"/>
    <text x="650" y="336" fill="#ffffff" font-size="11" font-family="JetBrains Mono" font-weight="700" text-anchor="middle" letter-spacing="0.5">ASSET</text>
  </g>
  <g>
    <circle cx="520" cy="360" r="30" fill="#6EF76E" fill-opacity="0.05" stroke="url(#dgClean)" stroke-width="1.5"/>
    <circle cx="520" cy="360" r="22" fill="#10132C" fill-opacity="0.55" stroke="#6EF76E" stroke-opacity="0.5" stroke-width="0.7"/>
    <circle cx="520" cy="360" r="3" fill="#6EF76E"/>
    <text x="520" y="406" fill="#ffffff" font-size="11" font-family="JetBrains Mono" font-weight="700" text-anchor="middle" letter-spacing="0.5">ORDER</text>
  </g>
</svg>
