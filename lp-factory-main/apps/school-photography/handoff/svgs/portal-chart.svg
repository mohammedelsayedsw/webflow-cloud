<svg viewBox="0 0 600 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Support load before vs after portal · ticket volume">
  <defs>
    <linearGradient id="gradBefore" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#E04F4F" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#E04F4F" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gradAfter" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#6EF76E" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6EF76E" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- y-axis label -->
  <text x="60" y="36" fill="#ffffff" opacity="0.55" font-size="11" font-family="JetBrains Mono" letter-spacing="1.5">
    SUPPORT LOAD · TICKETS / WEEK
  </text>

  <!-- gridlines -->
  <line x1="60" x2="480" y1="270" y2="270" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="60" x2="480" y1="220" y2="220" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="60" x2="480" y1="170" y2="170" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="60" x2="480" y1="120" y2="120" stroke="#ffffff" stroke-opacity="0.08"/>
  <line x1="60" x2="480" y1="70" y2="70" stroke="#ffffff" stroke-opacity="0.08"/>

  <!-- baseline -->
  <line x1="60" x2="480" y1="270" y2="270" stroke="#ffffff" stroke-opacity="0.25"/>

  <!-- BEFORE: red climbing curve -->
  <path d="M 60 114 C 102 114 102 106 144 106 C 186 106 186 94 228 94 C 270 94 270 90 312 90 C 354 90 354 82 396 82 C 438 82 438 78 480 78 L 480 270 L 60 270 Z" fill="url(#gradBefore)"/>
  <path d="M 60 114 C 102 114 102 106 144 106 C 186 106 186 94 228 94 C 270 94 270 90 312 90 C 354 90 354 82 396 82 C 438 82 438 78 480 78" fill="none" stroke="#E04F4F" stroke-width="2"/>

  <!-- AFTER: green crashing curve -->
  <path d="M 60 126 C 102 126 102 190 144 190 C 186 190 186 226 228 226 C 270 226 270 246 312 246 C 354 246 354 254 396 254 C 438 254 438 260 480 260 L 480 270 L 60 270 Z" fill="url(#gradAfter)"/>
  <path d="M 60 126 C 102 126 102 190 144 190 C 186 190 186 226 228 226 C 270 226 270 246 312 246 C 354 246 354 254 396 254 C 438 254 438 260 480 260" fill="none" stroke="#6EF76E" stroke-width="2"/>

  <!-- endpoints -->
  <circle cx="480" cy="78" r="5" fill="#E04F4F"/>
  <circle cx="480" cy="260" r="5" fill="#6EF76E"/>

  <!-- annotations -->
  <g>
    <rect x="492" y="64" width="70" height="28" rx="2" fill="none" stroke="#E04F4F" stroke-opacity="0.5"/>
    <text x="502" y="77" fill="#E04F4F" font-size="10" font-family="JetBrains Mono" letter-spacing="1">BEFORE</text>
    <text x="502" y="88" fill="#ffffff" opacity="0.9" font-size="11" font-family="JetBrains Mono" font-weight="600">climbing</text>
  </g>
  <g>
    <rect x="492" y="246" width="70" height="28" rx="2" fill="none" stroke="#6EF76E" stroke-opacity="0.7"/>
    <text x="502" y="259" fill="#6EF76E" font-size="10" font-family="JetBrains Mono" letter-spacing="1">AFTER</text>
    <text x="502" y="270" fill="#ffffff" opacity="0.9" font-size="11" font-family="JetBrains Mono" font-weight="600">−95%</text>
  </g>

  <!-- x-axis labels -->
  <text x="60" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T0</text>
  <text x="144" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T+1 mo</text>
  <text x="228" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T+2 mo</text>
  <text x="312" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T+3 mo</text>
  <text x="396" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T+4 mo</text>
  <text x="480" y="292" fill="#ffffff" opacity="0.55" font-size="10" font-family="JetBrains Mono" text-anchor="middle">T+6 mo</text>
</svg>
